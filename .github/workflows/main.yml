name: Flutter iOS Build

on:
  push:
    branches: [ master ] # 请确保这里和你仓库的主分支名一致
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      # TPNS-iOS 仅支持 CocoaPods，关闭 SPM 才能正确链接 XGPush（与 pubspec.yaml 中配置保持一致）
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install Flutter dependencies
        run: flutter pub get

      # ---------- 统一 iOS 最低部署版本到 15.0（安全网，防止本地与 CI 不一致）----------
      - name: Force iOS Deployment Target 15.0
        run: |
          echo "Updating project.pbxproj..."
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

          echo "Updating Podfile..."
          sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/g" ios/Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET'\] = '.*'/IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'/g" ios/Podfile

          echo "Updating AppFrameworkInfo.plist..."
          if [ -f "ios/Flutter/AppFrameworkInfo.plist" ]; then
            sed -i '' 's/<string>1[0-4]\.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
            sed -i '' 's/<string>9\.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
          fi
      # -----------------------------------------------------------------------------

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          echo "Verify TPNS pod was installed:"
          grep -n "TPNS-iOS" Podfile.lock || (echo "TPNS-iOS not found in Podfile.lock" && exit 1)

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: actions
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"
          echo "Installed provisioning profile: Nova-Dunes-AdHoc ($PP_UUID)"

      - name: Configure manual code signing
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          team_id = os.environ["IOS_TEAM_ID"]
          runner_bundle = "nova.dunes.dunes-app"
          pbx = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = pbx.read_text(encoding="utf-8")

          # 兼容 GitHub 上仍为旧 Bundle ID（含下划线）的情况
          text = text.replace("nova.dunes.dunes_app", runner_bundle)

          text = text.replace(
              "CODE_SIGN_STYLE = Automatic;",
              "CODE_SIGN_STYLE = Manual;",
          )

          signing_lines = (
              f"\t\t\t\tDEVELOPMENT_TEAM = {team_id};\n"
              '\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";\n'
              "\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = Nova-Dunes-AdHoc;\n"
          )

          pattern = re.compile(
              rf'(\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = {re.escape(runner_bundle)};\n)'
              rf'(?!\t\t\t\tDEVELOPMENT_TEAM = )'
          )
          text, count = pattern.subn(rf'\1{signing_lines}', text)

          if count == 0:
              ids = re.findall(r"PRODUCT_BUNDLE_IDENTIFIER = ([^;]+);", text)
              raise SystemExit(
                  "Runner bundle id not found in project.pbxproj. "
                  f"Found identifiers: {ids}"
              )

          pbx.write_text(text, encoding="utf-8")
          print(f"Manual signing configured for {runner_bundle} ({count} configs)")
          PY

      - name: Build signed Ad Hoc IPA
        env:
          TPNS_ACCESS_ID: ${{ secrets.TPNS_ACCESS_ID }}
          TPNS_ACCESS_KEY: ${{ secrets.TPNS_ACCESS_KEY }}
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.adhoc.plist \
            --dart-define=TPNS_ACCESS_ID="$TPNS_ACCESS_ID" \
            --dart-define=TPNS_ACCESS_KEY="$TPNS_ACCESS_KEY" \
            --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DunesAdHocIpa
          path: build/ios/ipa/*.ipa
