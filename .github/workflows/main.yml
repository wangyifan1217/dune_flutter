name: Flutter iOS Build

on:
  push:
    branches: [ master ] # 请确保这里和你仓库的主分支名一致
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - name: Install dependencies
        run: |
          # 对于 SPM 项目，只需要运行 pub get
          flutter pub get

      - name: Build iOS
        run: |
          flutter clean
          # SPM 项目通常不需要额外的 pod install，直接 build 即可
          flutter build ios --release --no-codesign --verbose

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r flutter_unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnsignedIosPackage
          path: flutter_unsigned.ipa
