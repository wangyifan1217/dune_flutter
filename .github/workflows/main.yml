name: Flutter iOS Build

on:
  push:
    branches: [ master ] # 请确保这里和你仓库的主分支名一致
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - name: Install dependencies
        run: |
          # 对于 SPM 项目，只需要运行 pub get
          flutter pub get

      # ---------- 强制提升 iOS 最低部署版本到 15.0 ----------
      - name: Force Update iOS Deployment Target to 15.0
        run: |
          echo "Forcing IPHONEOS_DEPLOYMENT_TARGET to 15.0 in project.pbxproj..."
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          echo "Updating AppFrameworkInfo.plist if it exists..."
          if [ -f "ios/Flutter/AppFrameworkInfo.plist" ]; then
            sed -i '' 's/<string>14.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
            sed -i '' 's/<string>13.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
            sed -i '' 's/<string>12.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
            sed -i '' 's/<string>11.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
            sed -i '' 's/<string>9.0<\/string>/<string>15.0<\/string>/g' ios/Flutter/AppFrameworkInfo.plist
          fi
      # -----------------------------------------------------------------

      # ---------- 在流水线中动态修复 AppDelegate.swift 的编译错误 ----------
      - name: Patch AppDelegate Swift Error
        run: |
          echo "Patching binaryMessenger in AppDelegate.swift..."
          sed -i '' 's/engineBridge.binaryMessenger/engineBridge.pluginRegistry.registrar(forPlugin: "CIPatchPlugin")!.messenger()/g' ios/Runner/AppDelegate.swift
          
          echo "Patching closure type inference in AppDelegate.swift..."
          sed -i '' 's/(call, result) in/(call: FlutterMethodCall, result: @escaping FlutterResult) in/g' ios/Runner/AppDelegate.swift
          sed -i '' 's/(call,result) in/(call: FlutterMethodCall, result: @escaping FlutterResult) in/g' ios/Runner/AppDelegate.swift
      # -----------------------------------------------------------------

      # ---------- 新增：注入伪造的团队 ID，绕过 Flutter 签名预检 ----------
      - name: Bypass iOS Code Signing Check
        run: |
          echo "Injecting dummy Development Team to satisfy Flutter pre-flight checks..."
          # 将一个假的 10 位团队 ID 和手动签名配置追加到 Release 环境配置中
          echo "DEVELOPMENT_TEAM=XXXXXXXXXX" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_STYLE=Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Release.xcconfig
      # -----------------------------------------------------------------

      - name: Build iOS
        run: |
          flutter clean
          # 携带 --no-codesign 真正执行打包
          flutter build ios --release --no-codesign --verbose

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r flutter_unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnsignedIosPackage
          path: flutter_unsigned.ipa