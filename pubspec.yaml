name: dunes_app
description: "沙丘 · 统一审批 App — 基于 index.html 原型 100% 还原的 Flutter 壳"
publish_to: 'none'

version: 1.0.2+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  http_parser: ^4.1.2
  shared_preferences: ^2.5.3
  file_selector: ^1.1.0
  permission_handler: ^12.0.3
  image_picker: ^1.2.2
  mime: ^2.0.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  centrifuge: ^0.20.0
  flutter_svg: ^2.3.0
  just_audio: ^0.10.5
  image: ^4.9.1
  gal: ^2.3.2
  flutter_local_notifications: ^22.0.1
  app_badge_plus: ^1.3.1
  package_info_plus: ^10.2.0
  mobile_scanner: ^7.2.0
  emoji_picker_flutter: ^4.4.0
  pro_image_editor: ^12.11.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_logo.png
  web:
    generate: true
    image_path: assets/images/app_logo.png
  windows:
    generate: true
    image_path: assets/images/app_logo.png
  macos:
    generate: true
    image_path: assets/images/app_logo.png

flutter:
  config:
    # TPNS-iOS 仅支持 CocoaPods，必须关闭 SPM 才能正确链接 XGPush
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/prototype/
    - assets/prototype/dunes_app_ui.js
    - assets/prototype/workbench_live.js
    - assets/prototype/xflow_detail.js
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
