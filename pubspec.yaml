name: dunes_app
description: "沙丘 · 统一审批 App — 基于 index.html 原型 100% 还原的 Flutter 壳"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  webview_flutter: ^4.13.0
  webview_flutter_web: ^0.2.3
  webview_flutter_wkwebview: ^3.25.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.png
    - assets/prototype/
    - assets/prototype/dunes_app_ui.js
    - assets/prototype/workbench_live.js
    - assets/prototype/xflow_detail.js
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
    - family: Geist Mono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
